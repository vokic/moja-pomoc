name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build catalog
        run: npm run build:catalog

      - name: Build (Vite + tsc)
        env:
          VITE_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: |
          npx tsc -b
          npx vite build

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      # Netlify deploy is configured via the Netlify <-> GitHub integration
      # in the Netlify dashboard. This action is here for visibility + as
      # a backup if Viktor wants to swap to GH-driven deploys. Uncomment +
      # add NETLIFY_AUTH_TOKEN / NETLIFY_SITE_ID secrets to enable.
      #
