<!DOCTYPE html>
<html lang="sr-Latn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vodič — Moja Pomoć</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --blue: #0C4DA2;
  --blue-dark: #073B7E;
  --blue-deep: #022047;
  --blue-tint: #F0F5FB;
  --blue-tint-2: #E3ECF6;
  --red: #C8102E;
  --text: #1A1A1A;
  --text-soft: #555;
  --text-muted: #888;
  --border: #DEE3EA;
  --border-soft: #ECEFF3;
}

html, body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: white;
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; }

/* ============ HEADER ============ */
.header {
  border-bottom: 3px solid var(--blue);
  padding: 20px 0;
}

.header-inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-mark {
  width: 32px;
  height: 32px;
  background: var(--blue);
  position: relative;
  flex-shrink: 0;
}

.brand-mark::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 12px;
  height: 12px;
  background: white;
  transform: translate(-50%, -50%) rotate(45deg);
}

.brand-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.005em;
}

.brand-name span {
  color: var(--blue);
}

.script-toggle {
  display: flex;
  gap: 12px;
  font-size: 13px;
}

.script-toggle button {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-weight: 500;
  padding: 0;
}

.script-toggle button.active {
  color: var(--blue);
  font-weight: 600;
}

/* ============ PROGRESS ============ */
.progress-bar {
  border-bottom: 1px solid var(--border);
  padding: 20px 0 24px;
}

.progress-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 24px;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
}

.progress-step {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  font-weight: 600;
}

.progress-step strong {
  color: var(--blue);
  font-size: 14px;
  font-weight: 700;
}

.progress-back {
  font-size: 13px;
  color: var(--text-muted);
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0;
}

.progress-back:hover {
  color: var(--blue);
}

.progress-track {
  height: 4px;
  background: var(--border-soft);
  position: relative;
  overflow: hidden;
}

.progress-fill {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  background: var(--blue);
  transition: width 0.3s ease;
}

.progress-dots {
  display: flex;
  gap: 4px;
  margin-top: 12px;
}

.progress-dot {
  flex: 1;
  height: 3px;
  background: var(--border-soft);
  transition: background 0.2s;
}

.progress-dot.done { background: var(--blue); }
.progress-dot.current { background: var(--red); }

/* ============ MAIN ============ */
main {
  flex: 1;
  padding: 48px 0;
}

.wizard {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 24px;
}

.wizard-q {
  margin-bottom: 32px;
}

.wizard-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--red);
  font-weight: 700;
  margin-bottom: 12px;
}

.wizard-question {
  font-size: clamp(1.5rem, 3vw, 2rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.2;
  color: var(--text);
  margin-bottom: 10px;
}

.wizard-hint {
  font-size: 15px;
  color: var(--text-soft);
  line-height: 1.55;
}

/* ============ OPTIONS ============ */
.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 40px;
}

.option {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  border: 2px solid var(--border);
  background: white;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
  text-align: left;
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
}

.option:hover {
  border-color: var(--blue);
  background: var(--blue-tint);
}

.option.selected {
  border-color: var(--blue);
  background: var(--blue-tint);
  color: var(--blue);
  font-weight: 600;
}

.option-marker {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  position: relative;
  background: white;
  transition: all 0.15s;
}

.option:hover .option-marker {
  border-color: var(--blue);
}

.option.selected .option-marker {
  border-color: var(--blue);
  background: var(--blue);
}

.option.selected .option-marker::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 6px;
  height: 10px;
  border-right: 2px solid white;
  border-bottom: 2px solid white;
  transform: translate(-50%, -60%) rotate(45deg);
}

/* Multi-select uses square marker */
.option.multi .option-marker {
  border-radius: 0;
}

/* Single-select uses circular marker */
.option.single .option-marker {
  border-radius: 50%;
}

.option.single.selected .option-marker::after {
  width: 8px;
  height: 8px;
  background: white;
  border: none;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.option-text {
  flex: 1;
}

/* ============ ACTIONS ============ */
.actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 24px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.15s;
  background: none;
}

.btn-primary {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}

.btn-primary:hover {
  background: var(--blue-dark);
  border-color: var(--blue-dark);
}

.btn-secondary {
  background: white;
  color: var(--text-soft);
  border-color: var(--border);
}

.btn-secondary:hover {
  border-color: var(--blue);
  color: var(--blue);
}

.btn-text {
  color: var(--text-muted);
  background: none;
  border: none;
  font-size: 13px;
  text-decoration: underline;
  padding: 8px 0;
}

.btn-text:hover {
  color: var(--blue);
}

.btn-arrow {
  transition: transform 0.15s;
}

.btn-primary:hover .btn-arrow {
  transform: translateX(3px);
}

.btn-arrow-back {
  transition: transform 0.15s;
}

.btn-secondary:hover .btn-arrow-back {
  transform: translateX(-3px);
}

/* ============ FOOTER ============ */
.footer {
  border-top: 1px solid var(--border);
  padding: 20px 0;
  font-size: 13px;
  color: var(--text-muted);
}

.footer-inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

/* ============ RESPONSIVE ============ */
@media (max-width: 720px) {
  main { padding: 32px 0; }
  .wizard, .progress-inner { padding: 0 16px; }
  .header-inner, .footer-inner { padding: 0 16px; }
  .actions { flex-direction: column; align-items: stretch; }
  .btn { justify-content: center; }
  .wizard-question { font-size: 1.5rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="/" class="brand">
      <div class="brand-mark"></div>
      <span class="brand-name">Moja <span>Pomoć</span></span>
    </a>
    <div class="script-toggle">
      <button class="active">Latinica</button>
      <button>Ћирилица</button>
    </div>
  </div>
</header>

<div class="progress-bar">
  <div class="progress-inner">
    <div class="progress-info">
      <span class="progress-step">Korak <strong id="step-num">4</strong> od 9</span>
      <button class="progress-back" onclick="window.location.href='/'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Prekini vodič
      </button>
    </div>
    <div class="progress-dots">
      <div class="progress-dot done"></div>
      <div class="progress-dot done"></div>
      <div class="progress-dot done"></div>
      <div class="progress-dot current"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
    </div>
  </div>
</div>

<main>
  <div class="wizard">
    <div class="wizard-q">
      <div class="wizard-label">— Zdravlje i porodica</div>
      <h1 class="wizard-question">Imate li dece, rođene ili usvojene?</h1>
      <p class="wizard-hint">
        Možete označiti više opcija. Ako nemate decu, izaberite "Nemam decu" i pređite na sledeće pitanje.
      </p>
    </div>

    <div class="options" id="options-container">
      <button class="option multi" data-value="nema" data-exclusive="true">
        <div class="option-marker"></div>
        <span class="option-text">Nemam decu</span>
      </button>
      <button class="option multi selected" data-value="beba">
        <div class="option-marker"></div>
        <span class="option-text">Bebu (do 1 godine)</span>
      </button>
      <button class="option multi" data-value="predskolsko">
        <div class="option-marker"></div>
        <span class="option-text">Predškolskog uzrasta (1 – 6 godina)</span>
      </button>
      <button class="option multi selected" data-value="osnovac">
        <div class="option-marker"></div>
        <span class="option-text">Školarca (7 – 14 godina)</span>
      </button>
      <button class="option multi" data-value="srednjoskolac">
        <div class="option-marker"></div>
        <span class="option-text">Srednjoškolca (15 – 18 godina)</span>
      </button>
      <button class="option multi" data-value="student">
        <div class="option-marker"></div>
        <span class="option-text">Studenta</span>
      </button>
      <button class="option multi" data-value="smetnje">
        <div class="option-marker"></div>
        <span class="option-text">Dete sa smetnjama u razvoju ili invaliditetom</span>
      </button>
      <button class="option multi" data-value="punoletno_zdravstveno">
        <div class="option-marker"></div>
        <span class="option-text">Punoletno dete sa zdravstvenim problemima</span>
      </button>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" onclick="goBack()">
        <svg class="btn-arrow-back" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Nazad
      </button>
      <button class="btn-text" onclick="skipStep()">Preskoči ovo pitanje</button>
      <button class="btn btn-primary" onclick="goNext()">
        Sledeće
        <svg class="btn-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </button>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <span>© 2026 Moja Pomoć · Informativni alat</span>
    <span>Vaši odgovori se ne čuvaju van vašeg pretraživača.</span>
  </div>
</footer>

<script>
// Script toggle
document.querySelectorAll('.script-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.script-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// Option selection (multi-select with exclusive logic)
document.querySelectorAll('.option').forEach(opt => {
  opt.addEventListener('click', () => {
    const isExclusive = opt.dataset.exclusive === 'true';
    const isMulti = opt.classList.contains('multi');
    
    if (!isMulti) {
      // Single select - clear others
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      return;
    }
    
    if (isExclusive) {
      // Selecting exclusive option clears all others
      const wasSelected = opt.classList.contains('selected');
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      if (!wasSelected) opt.classList.add('selected');
    } else {
      // Selecting non-exclusive clears any exclusive option
      document.querySelectorAll('.option[data-exclusive="true"]').forEach(o => o.classList.remove('selected'));
      opt.classList.toggle('selected');
    }
  });
});

function goBack() {
  alert('Idemo na korak 3');
}

function goNext() {
  alert('Idemo na korak 5');
}

function skipStep() {
  alert('Preskačemo i idemo na korak 5');
}
</script>

</body>
</html>
